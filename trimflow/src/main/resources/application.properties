# ===================================================================
# trimflow - Configurazione Backend
# ===================================================================

# Nome applicazione
spring.application.name=trimflow

# Server
server.port=${SERVER_PORT:8081}

# ===================================================================
# DATABASE - MariaDB
# ===================================================================
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mariadb://127.0.0.1:3306/trimflow?sslMode=DISABLED&serverTimezone=UTC&allowPublicKeyRetrieval=false}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:validate}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:false}
spring.jpa.open-in-view=false

# ===================================================================
# FLYWAY - Migrazioni database (PRODUZIONE)
# ===================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.sql-migration-prefix=V
spring.flyway.sql-migration-separator=__

spring.flyway.ignore-migration-patterns=*:missing,*:future

# ===================================================================
# JWT - Configurazione sicurezza
# ===================================================================
app.jwt.secret=${JWT_SECRET:CHANGE_THIS_IN_PRODUCTION_MIN_32_CHARS}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===================================================================
# WHATSAPP API - Notifiche (Opzionale)
# ===================================================================
# Abilita/disabilita funzionalità WhatsApp (default: true)
whatsapp.enabled=${WHATSAPP_ENABLED:true}

# Endpoint API Meta (non cambiare a meno di aggiornamenti ufficiali)
whatsapp.api.url=${WHATSAPP_API_URL:https://graph.facebook.com/v18.0}


whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}

# Timeout chiamate API WhatsApp (millisecondi)
whatsapp.api.timeout=${WHATSAPP_API_TIMEOUT:10000}

# ===================================================================
# LOGGING
# ===================================================================
# Livelli di log per ambiente di sviluppo
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.trimflow=${LOG_LEVEL_APP:DEBUG}
logging.level.org.springframework.web=${LOG_LEVEL_WEB:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:false}


logging.file.name=${LOG_FILE:/var/log/trimflow/trimflow.log}
logging.file.max-size=10MB
logging.file.max-history=5
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===================================================================
# DEVTOOLS (solo sviluppo - disabilitato di default in produzione)
# ===================================================================
spring.devtools.add-properties=false
spring.devtools.restart.enabled=${DEV_RESTART_ENABLED:false}
spring.devtools.livereload.enabled=${DEV_LIVERELOAD_ENABLED:false}

# ===================================================================
# SINGLE FETCH / STREAMING / CACHE
# ===================================================================
spring.web.resources.cache.cachecontrol.max-age=3600

# ===================================================================
# PRODUZIONE HARDENING (Opzionale ma consigliato)
# ===================================================================
# Disabilita banner Spring (minimo risparmio startup)
spring.main.banner-mode=off

# Timeout connessioni HTTP esterne (WhatsApp API)
spring.webflux.client.timeout=10s

# Limita dimensione upload (se aggiungerai upload immagini in futuro)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# Chiave AES a 256-bit (esattamente 32 caratteri)
# Genera con: openssl rand -base64 32 | head -c 32
# Chiave AES a 256-bit (esattamente 32 caratteri)
# In sviluppo temporaneo: sostituisci con una chiave sicura in produzione
encryption.secret-key=${ENCRYPTION_SECRET_KEY:01234567890123456789012345678901}

# -------------------------------------------------------------------
# Management / Actuator (dev friendly defaults)
# -------------------------------------------------------------------
# Espone alcuni endpoint utili per sviluppo e integrazione con Spring Tools
management.endpoints.web.exposure.include=health,info,metrics,env,beans
management.endpoint.health.show-details=always
