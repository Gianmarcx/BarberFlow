spring.application.name=gestionale

# Configurazione porta server springboot
server.port=8081

# Driver DB (scegli il driver corretto per il tuo DB)
# SE HAI MYSQL -> decommenta la riga con com.mysql.cj.jdbc.Driver
# SE HAI MARIADB -> decommenta la riga con org.mariadb.jdbc.Driver
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Dialect Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Dati di connessione al database
spring.datasource.url=jdbc:mariadb://127.0.0.1:3306/Barberflow
spring.datasource.username=root
spring.datasource.password=

# Flyway (applica le migration in src/main/resources/db/migration)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Comportamento Hibernate
# In sviluppo rapido puoi usare "update", ma con Flyway è consigliato usare "validate" o "none"
# Per prima esecuzione con Flyway: imposta validate o none dopo aver applicato le migration
spring.jpa.hibernate.ddl-auto=validate

# Mostra query SQL in console
spring.jpa.show-sql=true

# JWT configuration
app.jwt.secret=${JWT_SECRET:change_this_to_a_secure_value}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
