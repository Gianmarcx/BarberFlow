# ===================================================================
# BarberFlow - Configurazione Backend
# Per produzione: usare variabili d'ambiente o application-prod.properties
# ===================================================================

# Nome applicazione
spring.application.name=barberflow

# Server
server.port=${SERVER_PORT:8081}

# ===================================================================
# DATABASE - MariaDB
# ===================================================================
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mariadb://127.0.0.1:3306/barberflow}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:false}
spring.jpa.open-in-view=false

# ===================================================================
# FLYWAY - Migrazioni database
# ===================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.sql-migration-prefix=V
spring.flyway.sql-migration-separator=__

# ===================================================================
# JWT - Configurazione sicurezza
# ===================================================================
# IMPORTANTE: In produzione, impostare JWT_SECRET con una stringa di almeno 32 caratteri
app.jwt.secret=${JWT_SECRET:default-dev-secret-change-in-prod-min-32-chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===================================================================
# LOGGING
# ===================================================================
# Livelli di log per ambiente di sviluppo
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.barberflow=${LOG_LEVEL_APP:DEBUG}
logging.level.org.springframework.web=${LOG_LEVEL_WEB:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:false}

# ===================================================================
# DEVTOOLS (solo sviluppo - disabilitato in produzione)
# ===================================================================
spring.devtools.add-properties=false
spring.devtools.restart.enabled=${DEV_RESTART_ENABLED:false}
spring.devtools.livereload.enabled=${DEV_LIVERELOAD_ENABLED:false}

# ===================================================================
# SINGLE FETCH / STREAMING
# ===================================================================
spring.web.resources.cache.cachecontrol.max-age=3600